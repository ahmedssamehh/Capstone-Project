# ============================================
# APPLICATION CONFIGURATION
# ============================================
# This file contains all application settings
# Properties are read by Spring Boot at startup
# Environment-specific values can override these

# ============================================
# APPLICATION NAME
# ============================================
spring.application.name=manual-spring-boot

# ============================================
# SERVER CONFIGURATION
# ============================================
# Port where embedded Tomcat will listen
# Default: 8080
server.port=8080

# Context path (URL prefix for all endpoints)
# Default: / (root)
# Example: /api would make URLs like http://localhost:8080/api/api/users
# server.servlet.context-path=/

# ============================================
# DATABASE CONFIGURATION - PostgreSQL
# ============================================
# JDBC URL format: jdbc:postgresql://host:port/database
spring.datasource.url=jdbc:postgresql://localhost:5432/workhub

# Database credentials
spring.datasource.username=postgres
spring.datasource.password=postgres

# JDBC driver class (auto-detected from URL, but explicit is better)
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# CONNECTION POOL - HikariCP (Default)
# ============================================
# HikariCP is included with spring-boot-starter-data-jpa
# It's the fastest connection pool available

# Maximum number of connections in pool
spring.datasource.hikari.maximum-pool-size=10

# Minimum number of idle connections
spring.datasource.hikari.minimum-idle=5

# Connection timeout (milliseconds)
spring.datasource.hikari.connection-timeout=30000

# Maximum lifetime of connection (milliseconds)
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================
# DDL mode: what Hibernate does with schema
# - none: Do nothing
# - validate: Validate schema, make no changes
# - update: Update schema if needed (safe for dev)
# - create: Create schema, destroy previous data
# - create-drop: Create on startup, drop on shutdown
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console
# Useful for development, disable in production
spring.jpa.show-sql=true

# Format SQL for readability
spring.jpa.properties.hibernate.format_sql=true

# SQL dialect - PostgreSQL specific optimizations
# Auto-detected from driver, but explicit is better
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Show bind parameter values in logs
# Requires logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.properties.hibernate.use_sql_comments=true

# Disable Open Session In View (OSIV)
# OSIV keeps database session open until view is rendered
# Can cause performance issues and unexpected lazy loading
# Best practice: disable and use DTOs
spring.jpa.open-in-view=false

# ============================================
# LOGGING CONFIGURATION
# ============================================
# Root logging level
logging.level.root=INFO

# Application logging level
logging.level.com.example.app=DEBUG

# Spring Framework logging
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# Hibernate logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# HikariCP logging
logging.level.com.zaxxer.hikari=INFO

# Log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================
# JACKSON (JSON) CONFIGURATION
# ============================================
# Write dates as ISO-8601 strings, not timestamps
spring.jackson.serialization.write-dates-as-timestamps=false

# Time zone for date serialization
spring.jackson.time-zone=UTC

# Include non-null fields only
# spring.jackson.default-property-inclusion=non_null

# Pretty print JSON (dev only)
# spring.jackson.serialization.indent_output=true

# ============================================
# ERROR HANDLING
# ============================================
# Include error message in response
server.error.include-message=always

# Include binding errors (validation errors)
server.error.include-binding-errors=always

# Include stack trace (never in production!)
# server.error.include-stacktrace=never

# ============================================
# ACTUATOR ENDPOINTS (if included)
# ============================================
# Expose all actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics

# Health endpoint details
management.endpoint.health.show-details=when-authorized

# ============================================
# DEVTOOLS (if included)
# ============================================
# Enable automatic restart on code changes
spring.devtools.restart.enabled=true

# LiveReload (browser auto-refresh)
spring.devtools.livereload.enabled=true

# ============================================
# ALTERNATIVE: H2 DATABASE (for testing)
# ============================================
# Uncomment these and comment out PostgreSQL config to use H2

# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# H2 Console (web interface)
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ============================================
# NOTES
# ============================================
# 1. These are the EXPLICIT configurations
#    Spring Boot auto-configuration is still active
#    but we're overriding defaults with explicit values
#
# 2. For production, use:
#    - Environment variables
#    - application-prod.properties
#    - External configuration files
#    - Configuration server
#
# 3. Sensitive data (passwords, keys) should NEVER
#    be committed to version control
#    Use environment variables or secrets management
#
# 4. Profile-specific properties:
#    - application-dev.properties
#    - application-prod.properties
#    - application-test.properties
#    Activate with: spring.profiles.active=dev
