apiVersion: apps/v1
kind: Deployment
metadata:
  name: workhub-api
spec:
  minReadySeconds: 30
  template:
    spec:
      containers:
        - name: workhub-api
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 1536Mi
          # Production: require 2 consecutive readiness successes before receiving traffic
          readinessProbe:
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
            successThreshold: 2
          # Allow up to 5 minutes for cold start (schema validate, pool warmup, RabbitMQ)
          startupProbe:
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 60
            successThreshold: 1
          livenessProbe:
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
