apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: workhub-api
  labels:
    app.kubernetes.io/name: workhub-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: workhub-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: workhub-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: workhub
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 5672
