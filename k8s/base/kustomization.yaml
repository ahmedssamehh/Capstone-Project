# Base manifests — no Secrets committed; overlays inject credentials via secretGenerator.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: workhub

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: workhub-platform
    includeSelectors: false

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - poddisruptionbudget.yaml

images:
  - name: workhub-app
    newName: workhub-app
    newTag: "0.0.1-SNAPSHOT"
