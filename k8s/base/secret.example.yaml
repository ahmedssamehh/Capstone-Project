# TEMPLATE ONLY — do not apply with real credentials in CI/CD pipelines.
#
# Preferred: use Kustomize secretGenerator + secrets.env (see overlays/*/secrets.env.example)
#
# Manual bootstrap (emergency / minikube):
#   kubectl create namespace workhub
#   kubectl create secret generic workhub-api-secrets \
#     --namespace workhub \
#     --from-literal=DATABASE_USERNAME='...' \
#     --from-literal=DATABASE_PASSWORD='...' \
#     --from-literal=JWT_SECRET='...' \
#     --from-literal=RABBITMQ_USERNAME='...' \
#     --from-literal=RABBITMQ_PASSWORD='...' \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: workhub-api-secrets
  namespace: workhub
  labels:
    app.kubernetes.io/name: workhub-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: workhub-platform
    workhub.io/secret-type: credentials
type: Opaque
stringData:
  DATABASE_USERNAME: "<set-via-secret-manager>"
  DATABASE_PASSWORD: "<set-via-secret-manager>"
  JWT_SECRET: "<set-via-secret-manager-min-32-chars>"
  RABBITMQ_USERNAME: "<set-via-secret-manager>"
  RABBITMQ_PASSWORD: "<set-via-secret-manager>"
