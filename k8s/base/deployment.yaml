apiVersion: apps/v1
kind: Deployment
metadata:
  name: workhub-api
  labels:
    app.kubernetes.io/name: workhub-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: workhub-platform
    app.kubernetes.io/version: "0.0.1"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: workhub-api
  minReadySeconds: 15
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workhub-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: workhub-platform
        app.kubernetes.io/version: "0.0.1"
        workhub.io/workload: shared-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: workhub-api
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: workhub-api
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: workhub-api
                topologyKey: kubernetes.io/hostname
      containers:
        - name: workhub-api
          image: workhub-app:0.0.1-SNAPSHOT
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          # Non-sensitive config: bulk load from ConfigMap
          envFrom:
            - configMapRef:
                name: workhub-api-config
          # Sensitive values: explicit secretKeyRef (never inline, never in ConfigMap)
          env:
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: workhub-api-secrets
                  key: DATABASE_USERNAME
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workhub-api-secrets
                  key: DATABASE_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: workhub-api-secrets
                  key: JWT_SECRET
            - name: RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: workhub-api-secrets
                  key: RABBITMQ_USERNAME
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: workhub-api-secrets
                  key: RABBITMQ_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
              scheme: HTTP
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 48
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
              scheme: HTTP
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
            successThreshold: 1
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 10"]
