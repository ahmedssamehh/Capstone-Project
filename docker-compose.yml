version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workhub-app
    ports:
      - "8080:8080"
    environment:
      # Image defaults to prod profile; use application-prod.yml variable names locally.
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/workhub
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      JWT_SECRET: 01234567890123456789012345678901
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: workhub
      RABBITMQ_PASSWORD: workhub
      WORKHUB_RABBIT_EXCHANGE: workhub.jobs.direct
      WORKHUB_RABBIT_QUEUE: workhub.jobs.queue
      WORKHUB_RABBIT_ROUTING_KEY: workhub.jobs.process
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health/liveness"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - workhub-network

  postgres:
    image: postgres:15-alpine
    container_name: workhub-postgres
    environment:
      POSTGRES_DB: workhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - workhub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: workhub-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: workhub
      RABBITMQ_DEFAULT_PASS: workhub
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - workhub-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: workhub-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@workhub.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - workhub-network
    depends_on:
      - postgres
  

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  workhub-network:
    driver: bridge
