spring:
  application:
    name: workhub
  
  datasource:
    url: jdbc:postgresql://localhost:5432/workhub
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  # RabbitMQ broker connection (environment-friendly defaults)
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:workhub}
    password: ${RABBITMQ_PASSWORD:workhub}
    virtual-host: ${RABBITMQ_VHOST:/}

# WorkHub messaging topology (direct exchange pattern)
workhub:
  rabbitmq:
    exchange: ${WORKHUB_RABBIT_EXCHANGE:workhub.direct}
    queue: ${WORKHUB_RABBIT_QUEUE:workhub.events.queue}
    routing-key: ${WORKHUB_RABBIT_ROUTING_KEY:workhub.events}

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET:01234567890123456789012345678901}
  expiration: 86400000

logging:
  level:
    com.workhub: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
