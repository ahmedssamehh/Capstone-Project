spring:
  application:
    name: workhub
  
  datasource:
    url: jdbc:postgresql://localhost:5432/workhub
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

  # RabbitMQ broker connection (environment-friendly defaults)
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:workhub}
    password: ${RABBITMQ_PASSWORD:workhub}
    virtual-host: ${RABBITMQ_VHOST:/}

# WorkHub messaging topology (direct exchange pattern)
workhub:
  rabbitmq:
    exchange: ${WORKHUB_RABBIT_EXCHANGE:workhub.jobs.direct}
    queue: ${WORKHUB_RABBIT_QUEUE:workhub.jobs.queue}
    routing-key: ${WORKHUB_RABBIT_ROUTING_KEY:workhub.jobs.process}

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET:01234567890123456789012345678901}
  expiration: 86400000

logging:
  pattern:
    # Structured key=value logs with correlation ID from MDC.
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level app=%X{appName:-workhub} corr=%X{correlationId:-na} method=%X{httpMethod:-na} path=%X{httpPath:-na} logger=%logger{36} msg=\"%msg\"%n"
  level:
    com.workhub: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: workhub
