spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/workhub
    username: workhub_user
    password: change_me
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: UTC

server:
  port: 8080

app:
  multi-tenancy:
    header-name: X-Tenant-ID
