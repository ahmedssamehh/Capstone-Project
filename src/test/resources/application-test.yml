spring:
  datasource:
    url: jdbc:h2:mem:workhub_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  rabbitmq:
    dynamic: false
    host: localhost
    port: 5672
    username: guest
    password: guest

jwt:
  secret: 01234567890123456789012345678901
  expiration: 86400000

logging:
  level:
    com.workhub: INFO
    org.springframework: WARN
